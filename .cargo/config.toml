# Project-local cargo configuration.
#
# Why this exists: some contributors keep `[build] rustflags = ["-C",
# "link-arg=-fuse-ld=mold"]` in their global `~/.cargo/config.toml` to
# accelerate native link times. `mold` is x86_64-only and `rust-lld`
# (the wasm32 linker) rejects `-fuse-ld=mold` outright, so without an
# override here the wasm cdylib build (`relon-wasm`) fails at link
# time. We explicitly blank out the wasm32 target rustflags so the
# project builds out of the box regardless of the host's global cargo
# settings. The default `release` and `release-small` profile knobs
# (LTO, opt-level, panic-abort) still apply — they're profile-level,
# not rustflag-level.
[target.wasm32-unknown-unknown]
# Empty would be ideal, but cargo treats `rustflags = []` at this
# section as "no override" and falls back to `[build].rustflags`. A
# benign no-op flag (e.g. `--cap-lints=warn`, which is the default
# anyway) is enough to anchor this as a non-empty override and shadow
# the host's mold link-arg.
#
# `+simd128` enables the WebAssembly fixed-width SIMD proposal so the
# v128 intrinsics in `relon-ir/src/ascii_fold_simd.rs` (v3++ item 4)
# compile into wasm SIMD opcodes instead of scalar fallbacks. Every
# evergreen browser since 2023 (Safari 16.4 +) ships v128 support,
# so this widens nothing in practice; wasmtime / wasmer / Node ≥ 16
# all enable it by default too. Without this flag the `cfg(target_feature
# = "simd128")` arm is gated out and the autovectorised scalar
# path takes over — still correct, just slower.
#
# IMPORTANT: this rustflag MUST stay in sync with the
# `--enable-simd` argument in
# `crates/relon-wasm/Cargo.toml::package.metadata.wasm-pack.profile.*`.
# Removing one without the other yields either (a) scalar wasm (slow
# but correct) or (b) wasm-validator rejection in `wasm-opt` post-
# processing. Both knobs together is the supported state.
rustflags = ["--cap-lints=warn", "-Ctarget-feature=+simd128"]
