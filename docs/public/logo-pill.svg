<!--
  Brand form #19 — green pill with `{R}` glyph on a cream left
  half and `Relon` text on a green right half.

  The `{R}` keeps its native 670 × 407 aspect (== `logo-mini.svg`),
  composed at h=16 inside a 28-tall pill. Width = 16 × (670/407)
  = 26.34. The cream/green split lands at x=37 — a compromise
  between an even halve (x=48, which left the wordmark cramped)
  and a wordmark-favoured split (x=34, which left the cream half
  pinching the glyph). Horizontal centring of `{R}` in the 0–37
  cream half puts the glyph at x = (37 − 26.34) / 2 = 5.33.
-->
