<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<style>
  .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
  .head-text { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
  .head-tag { font: 600 10.5px ui-sans-serif, system-ui, sans-serif; fill: #7c3aed; letter-spacing: 0.06em; }
  .divider { stroke: #e2e8f0; stroke-width: 1; }
  .code { font: 13px ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; fill: #334155; }
  .kw { fill: #7c3aed; font-weight: 600; }
  .str { fill: #16a34a; }
  .num { fill: #ea580c; }
  .com { fill: #94a3b8; font-style: italic; }
  .key { fill: #0369a1; }
  .arrow { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .arrow-head { fill: #94a3b8; }
  .arrow-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0.06em; }
  .arrow-sub { font: 10px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
  .pill { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
  .pill-text { font: 600 11.5px ui-sans-serif, system-ui, sans-serif; fill: #1e40af; }
  .consumer-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0.04em; }
  .branch { stroke: #93c5fd; stroke-width: 1.2; fill: none; }

  @media (prefers-color-scheme: dark) {
    .panel { fill: #1e293b; stroke: #334155; }
    .head-text { fill: #cbd5e1; }
    .head-tag { fill: #c4b5fd; }
    .divider { stroke: #334155; }
    .code { fill: #cbd5e1; }
    .kw { fill: #c4b5fd; }
    .str { fill: #86efac; }
    .num { fill: #fdba74; }
    .com { fill: #64748b; }
    .key { fill: #7dd3fc; }
    .arrow { stroke: #64748b; }
    .arrow-head { fill: #64748b; }
    .arrow-label { fill: #94a3b8; }
    .arrow-sub { fill: #64748b; }
    .pill { fill: #1e3a8a; stroke: #3b82f6; }
    .pill-text { fill: #bfdbfe; }
    .consumer-label { fill: #94a3b8; }
    .branch { stroke: #3b82f6; }
  }
</style>

<g transform="translate(24, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">comfy/nodes.relon</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">LIBRARY</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0"><tspan class="kw">#enum</tspan> Node {</tspan><tspan x="20" dy="1.5em">  LoadCheckpoint {</tspan><tspan x="20" dy="1.5em">    ckpt: String,</tspan><tspan x="20" dy="1.5em">  },</tspan><tspan x="20" dy="1.5em">  KSampler {</tspan><tspan x="20" dy="1.5em">    seed: Int,</tspan><tspan x="20" dy="1.5em">    steps: Int,</tspan><tspan x="20" dy="1.5em">    cfg: Float,</tspan><tspan x="20" dy="1.5em">  },</tspan><tspan x="20" dy="1.5em">  SaveImage,</tspan><tspan x="20" dy="1.5em">}</tspan><tspan x="20" dy="1.5em"><tspan class="kw">#schema</tspan> Workflow {</tspan><tspan x="20" dy="1.5em">  nodes: List&lt;Node&gt;,</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g transform="translate(450, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">workflows/portrait.relon</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">ENTRY</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0"><tspan class="kw">#import</tspan> * from <tspan class="str">"../comfy/nodes.relon"</tspan></tspan><tspan x="20" dy="3em">Workflow portrait: {</tspan><tspan x="20" dy="1.5em">  nodes: [</tspan><tspan x="20" dy="1.5em">    Node.LoadCheckpoint {</tspan><tspan x="20" dy="1.5em">      ckpt: <tspan class="str">"sdxl.safetensors"</tspan>,</tspan><tspan x="20" dy="1.5em">    },</tspan><tspan x="20" dy="1.5em">    Node.KSampler {</tspan><tspan x="20" dy="1.5em">      seed: <tspan class="num">1234</tspan>,</tspan><tspan x="20" dy="1.5em">      steps: <tspan class="num">30</tspan>,</tspan><tspan x="20" dy="1.5em">      cfg: <tspan class="num">8.0</tspan>,</tspan><tspan x="20" dy="1.5em">    },</tspan><tspan x="20" dy="1.5em">    Node.SaveImage,</tspan><tspan x="20" dy="1.5em">  ]</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g transform="translate(876, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">portrait.json</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">JSON</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0">{</tspan><tspan x="20" dy="1.5em">  <tspan class="key">"portrait"</tspan>: {</tspan><tspan x="20" dy="1.5em">    <tspan class="key">"nodes"</tspan>: [</tspan><tspan x="20" dy="1.5em">      { <tspan class="key">"LoadCheckpoint"</tspan>: {</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"ckpt"</tspan>:</tspan><tspan x="20" dy="1.5em">          <tspan class="str">"sdxl.safetensors"</tspan></tspan><tspan x="20" dy="1.5em">      }},</tspan><tspan x="20" dy="1.5em">      { <tspan class="key">"KSampler"</tspan>: {</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"seed"</tspan>: <tspan class="num">1234</tspan>,</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"steps"</tspan>: <tspan class="num">30</tspan>,</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"cfg"</tspan>: <tspan class="num">8.0</tspan></tspan><tspan x="20" dy="1.5em">      }},</tspan><tspan x="20" dy="1.5em">      <tspan class="str">"SaveImage"</tspan></tspan><tspan x="20" dy="1.5em">    ]</tspan><tspan x="20" dy="1.5em">  }</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g>
  <path d="M 410 284 L 444 284" class="arrow"/>
  <path d="M 450 284 L 442 280 L 442 288 Z" class="arrow-head"/>
  <text x="427" y="276" text-anchor="middle" class="arrow-label">#import</text>
</g>

<g>
  <path d="M 836 284 L 870 284" class="arrow"/>
  <path d="M 876 284 L 868 280 L 868 288 Z" class="arrow-head"/>
  <text x="853" y="276" text-anchor="middle" class="arrow-label">EVAL</text>
  <text x="853" y="300" text-anchor="middle" class="arrow-sub">type-check + sandbox</text>
</g>

<g>
  <text x="876" y="582" class="consumer-label">CONSUMED BY</text>
  <path d="M 1066 544 L 1066 596" class="branch"/>
  <g transform="translate(1024, 596)">
    <rect width="84" height="28" rx="14" class="pill"/>
    <text x="42" y="18" text-anchor="middle" class="pill-text">ComfyUI</text>
  </g>
</g>

</svg>
