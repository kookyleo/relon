<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<style>
  .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
  .head-text { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
  .head-tag { font: 600 10.5px ui-sans-serif, system-ui, sans-serif; fill: #7c3aed; letter-spacing: 0.06em; }
  .divider { stroke: #e2e8f0; stroke-width: 1; }
  .code { font: 13px ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; fill: #334155; }
  .kw { fill: #7c3aed; font-weight: 600; }
  .str { fill: #16a34a; }
  .num { fill: #ea580c; }
  .com { fill: #94a3b8; font-style: italic; }
  .key { fill: #0369a1; }
  .arrow { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .arrow-head { fill: #94a3b8; }
  .arrow-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0.06em; }
  .arrow-sub { font: 10px ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; }
  .pill { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
  .pill-text { font: 600 11.5px ui-sans-serif, system-ui, sans-serif; fill: #1e40af; }
  .consumer-label { font: 600 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; letter-spacing: 0.04em; }
  .branch { stroke: #93c5fd; stroke-width: 1.2; fill: none; }

  @media (prefers-color-scheme: dark) {
    .panel { fill: #1e293b; stroke: #334155; }
    .head-text { fill: #cbd5e1; }
    .head-tag { fill: #c4b5fd; }
    .divider { stroke: #334155; }
    .code { fill: #cbd5e1; }
    .kw { fill: #c4b5fd; }
    .str { fill: #86efac; }
    .num { fill: #fdba74; }
    .com { fill: #64748b; }
    .key { fill: #7dd3fc; }
    .arrow { stroke: #64748b; }
    .arrow-head { fill: #64748b; }
    .arrow-label { fill: #94a3b8; }
    .arrow-sub { fill: #64748b; }
    .pill { fill: #1e3a8a; stroke: #3b82f6; }
    .pill-text { fill: #bfdbfe; }
    .consumer-label { fill: #94a3b8; }
    .branch { stroke: #3b82f6; }
  }
</style>

<g transform="translate(24, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">ui/forms.relon</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">LIBRARY</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0"><tspan class="kw">#enum</tspan> Field {</tspan><tspan x="20" dy="1.5em">  Text {</tspan><tspan x="20" dy="1.5em">    label: String,</tspan><tspan x="20" dy="1.5em">  },</tspan><tspan x="20" dy="1.5em">  Select {</tspan><tspan x="20" dy="1.5em">    label: String,</tspan><tspan x="20" dy="1.5em">    options: List&lt;String&gt;,</tspan><tspan x="20" dy="1.5em">  },</tspan><tspan x="20" dy="1.5em">}</tspan><tspan x="20" dy="1.5em"></tspan><tspan x="20" dy="1.5em"><tspan class="kw">#schema</tspan> Form {</tspan><tspan x="20" dy="1.5em">  fields: List&lt;Field&gt;,</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g transform="translate(450, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">forms/onboarding.relon</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">ENTRY</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0"><tspan class="kw">#import</tspan> * from <tspan class="str">"../ui/forms.relon"</tspan></tspan><tspan x="20" dy="3em">Form onboarding: {</tspan><tspan x="20" dy="1.5em">  fields: [</tspan><tspan x="20" dy="1.5em">    Field.Text {</tspan><tspan x="20" dy="1.5em">      label: <tspan class="str">"Name"</tspan>,</tspan><tspan x="20" dy="1.5em">    },</tspan><tspan x="20" dy="1.5em">    Field.Select {</tspan><tspan x="20" dy="1.5em">      label: <tspan class="str">"Dept"</tspan>,</tspan><tspan x="20" dy="1.5em">      options: [<tspan class="str">"Eng"</tspan>, <tspan class="str">"Sales"</tspan>],</tspan><tspan x="20" dy="1.5em">    },</tspan><tspan x="20" dy="1.5em">  ]</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g transform="translate(876, 24)">
  <rect width="380" height="520" rx="10" class="panel"/>
  <text x="20" y="28" class="head-text">onboarding.json</text>
  <text x="360" y="28" text-anchor="end" class="head-tag">JSON</text>
  <line x1="14" y1="42" x2="366" y2="42" class="divider"/>
  <text x="20" y="74" class="code" xml:space="preserve"><tspan x="20" dy="0">{</tspan><tspan x="20" dy="1.5em">  <tspan class="key">"onboarding"</tspan>: {</tspan><tspan x="20" dy="1.5em">    <tspan class="key">"fields"</tspan>: [</tspan><tspan x="20" dy="1.5em">      { <tspan class="key">"Text"</tspan>: {</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"label"</tspan>: <tspan class="str">"Name"</tspan></tspan><tspan x="20" dy="1.5em">      }},</tspan><tspan x="20" dy="1.5em">      { <tspan class="key">"Select"</tspan>: {</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"label"</tspan>: <tspan class="str">"Dept"</tspan>,</tspan><tspan x="20" dy="1.5em">        <tspan class="key">"options"</tspan>:</tspan><tspan x="20" dy="1.5em">          [<tspan class="str">"Eng"</tspan>,<tspan class="str">"Sales"</tspan>]</tspan><tspan x="20" dy="1.5em">      }}</tspan><tspan x="20" dy="1.5em">    ]</tspan><tspan x="20" dy="1.5em">  }</tspan><tspan x="20" dy="1.5em">}</tspan></text>
</g>

<g>
  <path d="M 410 284 L 444 284" class="arrow"/>
  <path d="M 450 284 L 442 280 L 442 288 Z" class="arrow-head"/>
  <text x="427" y="276" text-anchor="middle" class="arrow-label">#import</text>
</g>

<g>
  <path d="M 836 284 L 870 284" class="arrow"/>
  <path d="M 876 284 L 868 280 L 868 288 Z" class="arrow-head"/>
  <text x="853" y="276" text-anchor="middle" class="arrow-label">EVAL</text>
  <text x="853" y="300" text-anchor="middle" class="arrow-sub">type-check + sandbox</text>
</g>

<g>
  <text x="876" y="582" class="consumer-label">CONSUMED BY</text>
  <path d="M 1066 544 L 1066 558" class="branch"/>
  <path d="M 1016 558 L 1116 558" class="branch"/>
  <path d="M 1016 558 L 1016 596" class="branch"/>
  <path d="M 1116 558 L 1116 596" class="branch"/>
  <g transform="translate(974, 596)">
    <rect width="84" height="28" rx="14" class="pill"/>
    <text x="42" y="18" text-anchor="middle" class="pill-text">Web</text>
  </g>
  <g transform="translate(1074, 596)">
    <rect width="84" height="28" rx="14" class="pill"/>
    <text x="42" y="18" text-anchor="middle" class="pill-text">Mobile</text>
  </g>
</g>

</svg>
