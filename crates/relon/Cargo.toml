[package]
name = "relon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Public API facade for the Relon language"
keywords = ["config", "dsl", "json", "sandboxed", "embedded"]
categories = ["config", "parsing", "compilers"]

[dependencies]
relon-evaluator = { workspace = true }
relon-parser = { workspace = true }
relon-analyzer = { workspace = true }
# Phase 8: facade Backend enum needs the wasm-AOT evaluator to wire
# `Backend::WasmAot` through `new_evaluator`. Tree-walk-only hosts
# still pay the dependency, but the cost is a wasmtime link only at
# build time — runtime selection stays a single enum match.
relon-codegen-wasm = { workspace = true }
relon-eval-api = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
