[package]
name = "relon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Public API facade for the Relon language"
keywords = ["config", "dsl", "json", "sandboxed", "embedded"]
categories = ["config", "parsing", "compilers"]

[features]
# v5-β-2 stage 4: `cranelift-aot` toggles the cranelift-backed native
# AOT evaluator. Default-on for native hosts (the cranelift backend
# is the only AOT path after wasm-AOT retirement); excluded entirely
# from wasm32 targets through the absence of `relon-codegen-native`
# under `target.'cfg(target_arch = "wasm32")'.dependencies`, which
# keeps `relon-wasm` (browser playground) free of the cranelift
# dependency tree.
default = ["cranelift-aot"]
cranelift-aot = ["dep:relon-codegen-native"]

[dependencies]
relon-evaluator = { workspace = true }
relon-parser = { workspace = true }
relon-analyzer = { workspace = true }
# v5-β-2 stage 4: cranelift-AOT backend lives in a separate crate so
# the wasm32 target (`relon-wasm`, browser playground) can opt out via
# the absence of the `cranelift-aot` feature. Since the wasm-AOT
# backend retired in stage 4 this is the only AOT path; default-on
# above means native hosts get it without opting in.
relon-codegen-native = { workspace = true, optional = true }
# v6-δ M2-A: stack-based bytecode VM as a third evaluator backend.
# Always-on (no feature gate) because the crate has no native-only
# dependencies and the wasm32 build needs it for `Backend::Bytecode`
# regression coverage.
relon-bytecode = { workspace = true }
relon-eval-api = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
# v5-γ: best-effort cache load failures surface as tracing::warn so a
# host pipeline can observe them without changing the
# RuntimeError surface.
tracing = "0.1"

[dev-dependencies]
# v3++ b-2: integration tests for `#import` hash pinning need to
# compute a sha256 over a mock-server body and check it against the
# directive's inline pin. The runtime deps for sha2 / hex are already
# pulled in transitively through `relon-evaluator` and
# `relon-analyzer`; we re-declare them here so the test file can use
# them directly without relying on dependency inheritance.
sha2 = { workspace = true }
hex = { workspace = true }
# v6-fix-D2 default-path: smoke test for the on-disk cache hit needs
# an isolated cache root so concurrent test threads don't observe
# each other's writes. The auto_evaluator_smoke.rs file overrides
# XDG_CACHE_HOME / HOME for the duration of the test and restores on
# drop via an env guard.
tempfile = "3"
