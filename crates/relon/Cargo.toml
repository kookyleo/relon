[package]
name = "relon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Public API facade for the Relon language"
keywords = ["config", "dsl", "json", "sandboxed", "embedded"]
categories = ["config", "parsing", "compilers"]

[features]
# `wasm-aot` is off by default so the freestanding wasm builds
# (`relon-wasm`, browser playground) stay clean of wasmtime. Native
# hosts that want the wasm-AOT backend opt in explicitly:
# `relon = { version = "...", features = ["wasm-aot"] }`. The CLI
# always enables it; the workspace-wide `cargo build` picks the
# feature up through that path so day-to-day developer flows still
# see both backends.
wasm-aot = ["dep:relon-codegen-wasm"]

[dependencies]
relon-evaluator = { workspace = true }
relon-parser = { workspace = true }
relon-analyzer = { workspace = true }
# Phase 8: facade Backend enum needs the wasm-AOT evaluator to wire
# `Backend::WasmAot` through `new_evaluator`. The dependency is
# feature-gated so wasm32 hosts that can't link wasmtime still
# compile against the tree-walker.
relon-codegen-wasm = { workspace = true, optional = true }
relon-eval-api = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
