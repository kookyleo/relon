[package]
name = "relon-wasm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "WASM bindings for the Relon language (browser playground / embeddable runtime)"
keywords = ["wasm", "dsl", "config", "playground"]
categories = ["wasm", "development-tools"]
# Not published yet: kept internal until the docs playground (Wave 2/3)
# ships and we have user-facing examples. Flip to true once the API
# surface stabilises.
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

# wasm-pack profile knobs.
#
# Rust 1.82+ emits `memory.copy` / `memory.fill` (the bulk-memory proposal)
# unconditionally because the wasm32-unknown-unknown spec baseline now
# enables them. The `wasm-opt` binary `wasm-pack` vendors defaults to a
# pre-bulk-memory feature set and rejects the input as invalid. Explicitly
# enable the feature so optimisation succeeds. Bulk-memory is supported by
# every evergreen browser since 2021, so this widens nothing in practice.
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int", "--enable-simd"]

[package.metadata.wasm-pack.profile.profiling]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int", "--enable-simd"]

[dependencies]
# v5-β-2 stage 4: the workspace-level `relon` dep already declares
# `default-features = false` so wasm32 builds (browser playground)
# don't pull cranelift-jit / region (neither builds on wasm32).
# Native consumers re-enable `cranelift-aot` explicitly; this crate
# is wasm32-only at the build target so the tree-walker is the only
# evaluator we need.
relon = { workspace = true }
relon-parser = { workspace = true }
relon-evaluator = { workspace = true }
relon-analyzer = { workspace = true }
relon-fmt = { workspace = true }
miette = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
