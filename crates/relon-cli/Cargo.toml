[package]
name = "relon-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Command line interface for the Relon language"

[dependencies]
relon = { path = "../relon" }
relon-parser = { path = "../relon-parser" }
relon-evaluator = { path = "../relon-evaluator" }
relon-analyzer = { path = "../relon-analyzer" }
relon-fmt = { path = "../relon-fmt" }
relon-lsp = { path = "../relon-lsp" }
clap = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
anyhow = { workspace = true }
miette = { workspace = true, features = ["derive", "fancy"] }
ariadne = "0.6.0"
