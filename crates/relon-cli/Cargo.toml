[package]
name = "relon-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Command line interface for the Relon language"
default-run = "relon-cli"

[dependencies]
relon = { path = "../relon" }
relon-parser = { path = "../relon-parser" }
relon-evaluator = { path = "../relon-evaluator" }
relon-analyzer = { path = "../relon-analyzer" }
relon-fmt = { path = "../relon-fmt" }
relon-lsp = { path = "../relon-lsp" }
clap = { version = "4.4", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
miette = { version = "7.6.0", features = ["derive", "fancy"] }
ariadne = "0.6.0"
