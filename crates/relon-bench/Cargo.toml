[package]
name = "relon-bench"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Micro-benchmarks for the Relon evaluator (parse + eval timings on canned sources)"
publish = false

[features]
# Enable heap allocation profiling for `profile_alloc`. Off by default so
# the workspace `cargo build` / `cargo test` paths stay free of the
# profiler's global allocator override.
dhat-heap = ["dep:dhat"]

[dependencies]
relon-parser = { workspace = true }
relon-evaluator = { workspace = true }
# Phase 9: wasm-AOT comparison bench depends on the codegen crate to
# drive `WasmAotEvaluator::from_source` + `run_main` directly, so the
# harness can isolate cold-start (parse + analyze + lower + codegen +
# wasmtime::Module::new) from warm invoke (instantiate + buffer
# marshal + wasm execution). Wired as a regular dep, not feature-gated,
# because the bench crate is host-only (never built for wasm32) and
# `cargo bench` always wants both backends available.
relon-codegen-wasm = { workspace = true }
# v5-beta-1: cranelift-AOT comparison bench. Mirrors the wasm-AOT
# wiring shape; bench crate is host-only so we can pull both backends
# unconditionally.
relon-codegen-native = { workspace = true }
relon-ir = { workspace = true }
relon-eval-api = { workspace = true }
dhat = { version = "0.3", optional = true }

[dev-dependencies]
# Criterion 0.5.x: stage P0 measurement infra. Provides per-dimension
# corpus + statistical report (mean / median / stddev / outliers).
# Pinned to 0.5 to avoid upstream churn (0.6+ API / wasm tweaks).
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

# Method-dispatch group uses `#main(List<Int> xs) ... xs.map((n) => n * 2)`
# so the receiver type is known statically — that requires the analyzer to
# resolve `.map` against the core `List` schema. Pulled in as a dev-dep so
# it does not leak into the (non-test) bench binary surface.
relon-analyzer = { workspace = true }

# `main.rs` is kept as a quick-eyeball binary (single cold run + 1000-iter
# steady-state mean, same shape as the legacy output) so contributors can
# read absolute magnitudes without spinning up the full criterion sampler.
# For serious measurement run `cargo bench -p relon-bench` (group below).

[[bench]]
name = "harness_v1"
harness = false
path = "benches/harness_v1.rs"

# Phase 9 closeout: pit the wasm-AOT backend against the tree-walker
# across four canonical scenarios (arithmetic / dict-literal /
# stdlib / method-dispatch). Each scenario splits into three probes:
# `cold_start` (full pipeline), `warm_invoke` (run_main on a
# preassembled evaluator), `tree_walk_total` (tree-walker single-shot
# baseline). Run via `cargo bench -p relon-bench --bench wasm_aot_vs_tree_walk`.
[[bench]]
name = "wasm_aot_vs_tree_walk"
harness = false
path = "benches/wasm_aot_vs_tree_walk.rs"

# v5-beta-1 cranelift-AOT vs wasm-AOT cold/warm comparison. Uses
# synthetic IR for the arithmetic scenario because the cranelift
# backend doesn't yet drive the analyzer / lower pipeline through
# `from_source` for buffer-protocol bodies. Run via
# `cargo bench -p relon-bench --bench cranelift_aot_vs_wasm_aot`.
[[bench]]
name = "cranelift_aot_vs_wasm_aot"
harness = false
path = "benches/cranelift_aot_vs_wasm_aot.rs"
