[workspace]
members = [
    "crates/*",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/relonlang/relon"
description = "A programmable configuration language that extends JSON"

[workspace.dependencies]
winnow = "0.6"
ordered-float = { version = "4.2", features = ["serde"] }
memchr = "2.7"
