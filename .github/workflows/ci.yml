name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  stable:
    name: stable (fmt + clippy + test + fmt-check fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: relon-fmt --check fixtures
        run: cargo run -q -p relon-fmt -- --check fixtures/*.relon fixtures/modules/*.relon fixtures/errors/*.relon examples/*.relon

  msrv:
    name: msrv build (1.92)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.92
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: cargo build (workspace, all targets)
        run: cargo build --workspace --all-targets

  miri:
    # F-1 per docs/internal/formalization-targets-2026-05-23.md:
    # run cargo miri on every crate whose unsafe surface lives in
    # pure Rust (no cranelift / FFI / mmap). Catches UB regressions
    # in the trace-jit runtime helpers, bytecode arena, SmolStr SSO,
    # and recorder bookkeeping.
    #
    # NOT covered: relon-codegen-cranelift (pulls cranelift / wasmtime
    # whose generated nightly code currently uses unstable features
    # the pinned miri rustc rejects) and relon-wasm-bindings (browser target).
    # Those keep their stable-job coverage.
    name: miri (unsafe modules)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install nightly + miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: miri setup
        run: cargo +nightly miri setup
      - name: miri test (relon-eval-api)
        run: cargo +nightly miri test -p relon-eval-api
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
      - name: miri test (relon-trace-abi)
        run: cargo +nightly miri test -p relon-trace-abi
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
      - name: miri test (relon-trace-jit lib)
        run: cargo +nightly miri test -p relon-trace-jit --lib
        env:
          # `-Zmiri-ignore-leaks` is required for this crate: the
          # `__relon_str_*` / `StringRef::from_owned|from_static` /
          # `__relon_str_concat_n_alloc` / `__relon_str_substring`
          # runtime helpers are caller-managed — production code drains
          # them via `reclaim_trace_strings()` at trace exit. The unit
          # tests intentionally exercise the alloc shape without the
          # reclaim call, so miri's default "leak == error" flags every
          # such test. The flag suppresses *leak* reporting only;
          # use-after-free / double-free / OOB checks still fire, which
          # is what the F-1 sweep actually buys.
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-ignore-leaks
      - name: miri test (relon-trace-recorder)
        run: cargo +nightly miri test -p relon-trace-recorder
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
      - name: miri test (relon-bytecode lib)
        run: cargo +nightly miri test -p relon-bytecode --lib
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  kani:
    # F-2 per docs/internal/formalization-targets-2026-05-23.md:
    # bounded model-check the layout arithmetic in the trace-JIT
    # runtime helpers (dict_v2 entry table bounds, stored payload
    # bounds, str_concat_n_alloc cursor bounds, str_substring
    # clamping). Proofs live in
    # crates/relon-trace-jit/src/runtime/proofs.rs behind #[cfg(kani)].
    #
    # Local: cargo kani -p relon-trace-jit.
    name: kani (JIT helper bounds proofs)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Kani
        uses: model-checking/kani-github-action@v1
      - name: kani -p relon-trace-jit
        run: cargo kani -p relon-trace-jit
