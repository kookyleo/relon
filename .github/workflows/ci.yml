name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  stable:
    name: stable (fmt + clippy + test + fmt-check fixtures)
    runs-on: ubuntu-latest
    env:
      # `relon-codegen-llvm` is a workspace member with a hard `inkwell`
      # / `llvm-sys` dep, so every workspace-wide cargo invocation
      # (clippy / test / build) needs the LLVM 18 dev libs on PATH.
      # Matches the local dev pin documented in
      # `crates/relon-codegen-llvm/Cargo.toml`.
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Free disk space
        # The workspace links cranelift + wasmtime + LLVM 18; the runner's
        # ~14 GB default free space can exhaust during link (manifesting as
        # `No space left on device` or a `ld` SIGBUS/Bus-error). Drop the
        # preinstalled toolchains we don't use to reclaim ~20-30 GB before
        # cargo runs. Done before toolchain install so nothing we need is
        # removed.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /
      - name: Install LLVM 18 dev libs (with Polly)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm-18-dev libpolly-18-dev
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: relon-fmt --check fixtures
        run: cargo run -q -p relon-fmt -- --check fixtures/*.relon fixtures/modules/*.relon fixtures/errors/*.relon examples/*.relon

  msrv:
    name: msrv build (1.92)
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_181_PREFIX: /usr/lib/llvm-18
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Free disk space
        # The workspace links cranelift + wasmtime + LLVM 18; the runner's
        # ~14 GB default free space can exhaust during link (manifesting as
        # `No space left on device` or a `ld` SIGBUS/Bus-error). Drop the
        # preinstalled toolchains we don't use to reclaim ~20-30 GB before
        # cargo runs. Done before toolchain install so nothing we need is
        # removed.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /
      - name: Install LLVM 18 dev libs (with Polly)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm-18-dev libpolly-18-dev
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.92
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: cargo build (workspace, all targets)
        run: cargo build --workspace --all-targets

  portable-core:
    name: portable core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo test portable core
        run: cargo test -p relon-parser -p relon-analyzer -p relon-eval-api -p relon-evaluator -p relon-fmt -p relon --no-default-features
      - name: cargo build CLI
        run: cargo test -p relon-cli --no-run

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs
        working-directory: docs
        run: npm run docs:build

  # The kani job (F-2 bounds proofs) was removed: its only proof target
  # lived in a retired experimental JIT proof crate deleted in 62bf6805.
  # No #[cfg(kani)] proofs remain in the
  # workspace, so there is nothing to model-check.
