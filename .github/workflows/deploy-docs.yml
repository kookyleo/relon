name: Deploy VitePress site to Pages

on:
  push:
    branches: [main, master]
    # Tagged releases also rebuild the site so the published docs
    # snapshot reflects whatever was tagged. The workflow checks out
    # the tag ref (not main) so the deployed site matches the tag's
    # source tree. Concurrency group `pages` (below) queues runs so a
    # rapid main + tag pair lands the latest in sequence.
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Setup Rust (stable + wasm32 target)
        # relon-wasm builds with wasm-pack which needs cargo + the
        # wasm32-unknown-unknown target. Pin to stable for
        # reproducibility.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock', 'crates/relon-wasm/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        working-directory: docs
        run: npm ci || npm install
      - name: Build wasm (relon-wasm → docs/public/wasm/relon/)
        # Gitignored output; must rebuild on every CI run. Source of
        # truth is crates/relon-wasm.
        working-directory: docs
        run: npm run build:wasm
      - name: Build with VitePress
        working-directory: docs
        run: npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
